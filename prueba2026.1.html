<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Universo Contigo - Saturno Lleno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02010a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .instrucciones {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            z-index: 10;
            pointer-events: none;
            font-size: 0.9rem;
            text-shadow: 0 0 6px rgba(0,0,0,0.9);
            text-align: center;
            background: rgba(15, 10, 30, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }
    </style>
    <!-- Cargamos Three.js y OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="instrucciones">
        🎵 HAZ CLIC EN CUALQUIER PARTE para reproducir la música • Usa el mouse para hacer Zoom
    </div>
    <div id="canvas-container"></div>

    <!-- AUDIO TRADICIONAL CON CROSSORIGIN ANONYMOUS PARA EVITAR BLOQUEOS DE NAVEGADOR -->
    <audio id="musica-universo" loop crossorigin="anonymous">
        <!-- Enlace de música por defecto (Garantizado que funciona y no se bloquea) -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <script>
        // --- CONTROL DE AUDIO SEGURO ---
        const audio = document.getElementById('musica-universo');
        let audioIniciado = false;

        // Intentar cambiar el origen a tu Drive si lo deseas. 
        // NOTA: Para Drive usa este formato: https://docs.google.com/uc?export=download&id=TU_ID_DE_DRIVE
        // RESPALDO: Si usas otra URL externa, el atributo crossorigin="anonymous" de arriba evitará que se silencie.
        
        function activarAudio() {
            if (!audioIniciado) {
                audio.play().then(() => {
                    audioIniciado = true;
                    console.log("Audio iniciado con éxito.");
                }).catch(error => {
                    console.log("Esperando una interacción válida del usuario...", error);
                });
            }
        }

        // Activadores globales al hacer clic o tocar la pantalla
        window.addEventListener('click', activarAudio);
        window.addEventListener('touchstart', activarAudio);


        // --- CONFIGURACIÓN ESCENA 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 35); // Vista inicial panorámica y lejana de Saturno

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 60; 
        controls.minDistance = 9;  

        // --- ILUMINACIÓN CÓSMICA ---
        const ambientLight = new THREE.AmbientLight(0x554466); // Luz ambiental morada/azulada
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xfff5ea, 1.5); // Luz estelar cálida
        directionalLight.position.set(12, 8, 10);
        scene.add(directionalLight);

        // --- CREACIÓN DE SATURNO ---
        const saturnGroup = new THREE.Group(); 

        // Cuerpo del Planeta
        const planetGeometry = new THREE.SphereGeometry(4.5, 64, 64);
        const saturnCanvas = document.createElement('canvas');
        saturnCanvas.width = 512;
        saturnCanvas.height = 256;
        const ctx = saturnCanvas.getContext('2d');
        let grad = ctx.createLinearGradient(0, 0, 0, 256);
        grad.addColorStop(0, '#2b160a');
        grad.addColorStop(0.2, '#94663d');
        grad.addColorStop(0.4, '#d9b473');
        grad.addColorStop(0.5, '#b08450');
        grad.addColorStop(0.6, '#d9b473');
        grad.addColorStop(0.8, '#94663d');
        grad.addColorStop(1, '#2b160a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 256);
        
        const planetTexture = new THREE.CanvasTexture(saturnCanvas);
        const planetMaterial = new THREE.MeshPhongMaterial({ map: planetTexture, shininess: 15 });
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        saturnGroup.add(planet);

        // Anillos en 3D
        const ringGeometry = new THREE.RingGeometry(6.2, 11.5, 64);
        const ringCanvas = document.createElement('canvas');
        ringCanvas.width = 256;
        ringCanvas.height = 1;
        const ringCtx = ringCanvas.getContext('2d');
        let ringGrad = ringCtx.createLinearGradient(0, 0, 256, 0);
        ringGrad.addColorStop(0, 'rgba(148, 102, 61, 0.8)');
        ringGrad.addColorStop(0.2, 'rgba(217, 180, 115, 0.6)');
        ringGrad.addColorStop(0.4, 'rgba(0, 0, 0, 0)'); // División de Cassini
        ringGrad.addColorStop(0.6, 'rgba(176, 132, 80, 0.7)');
        ringGrad.addColorStop(1, 'rgba(43, 22, 10, 0)');
        ringCtx.fillStyle = ringGrad;
        ringCtx.fillRect(0, 0, 256, 1);

        const ringTexture = new THREE.CanvasTexture(ringCanvas);
        const ringMaterial = new THREE.MeshPhongMaterial({ 
            map: ringTexture, 
            side: THREE.DoubleSide, 
            transparent: true,
            opacity: 0.85
        });
        
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2; 
        saturnGroup.add(ring);

        saturnGroup.rotation.z = 0.35; // Inclinación del planeta
        scene.add(saturnGroup);

        // --- ENTORNO: 3000 ESTRELLAS ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 300;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);


        // --- NUBE MASIVA DE PALABRAS (34 Expresiones / Verbos) ---
        const sentimientos = [
            "Amarte ❤️", "Cuidarte 🌹", "Besarte 💋", "Abrazarte 🫂",
            "Escucharte 👂", "Adorarte ✨", "Valorarte 💎", "Protegerte 🛡️",
            "Soñarte 💭", "Admirarte 😍", "Acompañarte 🤝", "Inspirarte 💡",
            "Entenderte 🧠", "Extrañarte ⌛", "Apoyarte 🏋️", "Hacerte reír 😂",
            "Pensarte 🤔", "Elegirte ✔️", "Valorarte 👑", "Sentirte 💓",
            "Buscarte 🔍", "Aceptarte 🕊️", "Esperarte ⏰", "Descubrirte 🗺️",
            "Recordarte 💾", "Fascinarte 🔮", "Consentirte 🧸", "Motivarte 🚀",
            "Ilusionarte 🌠", "Sanarte 🩹", "Guiarte 🧭", "Comprenderte 🤝",
            "Divertirte 🥳", "Respetarte ✊"
        ];

        const textMeshes = [];

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            
            context.font = 'Bold 36px "Segoe UI", sans-serif';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.shadowColor = '#ffb473';
            context.shadowBlur = 15; // Brillo de neón dorado/estelar
            context.fillText(text, 256, 70);
            
            return new THREE.CanvasTexture(canvas);
        }

        // Distribución en múltiples capas/radios para que se vea lleno en profundidad
        sentimientos.forEach((texto, index) => {
            const textTexture = createTextTexture(texto);
            const spriteMaterial = new THREE.SpriteMaterial({ map: textTexture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            
            sprite.scale.set(6.5, 1.6, 1); 

            // Variamos los radios para crear una nube densa tridimensional (unas cerca de los anillos, otras lejos)
            const radioOrbita = 15 + (index % 3) * 4; // Distribuye entre distancias 15, 19 y 23

            const phi = Math.acos(-1 + (2 * index) / sentimientos.length);
            const theta = Math.sqrt(sentimientos.length * Math.PI) * phi;
            
            sprite.position.x = radioOrbita * Math.sin(phi) * Math.cos(theta);
            sprite.position.y = radioOrbita * Math.sin(phi) * Math.sin(theta);
            sprite.position.z = radioOrbita * Math.cos(phi);

            // Cada palabra tendrá una velocidad y dirección ligeramente distinta para dar dinamismo
            sprite.userData = {
                speedY: 0.001 + (index % 3) * 0.001,
                direction: (index % 2 === 0) ? 1 : -1
            };

            scene.add(sprite);
            textMeshes.push(sprite);
        });


        // --- BUCLE DE ANIMACIÓN RENDERING ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotación suave de Saturno sobre su eje inclinado
            saturnGroup.rotation.y += 0.0025;

            // Animación de la gran nube de palabras
            textMeshes.forEach((sprite) => {
                // Rotan en direcciones alternas alrededor del eje Y para un efecto más caótico y lleno
                sprite.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), sprite.userData.speedY * sprite.userData.direction);
            });

            controls.update(); 
            renderer.render(scene, camera);
        }

        // Redimensionamiento de pantalla dinámico
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
