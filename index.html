<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Universo Contigo - Saturno Máximo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #02010a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .instrucciones {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.85);
            z-index: 10;
            pointer-events: none;
            font-size: 0.9rem;
            text-shadow: 0 0 6px rgba(0,0,0,0.9);
            text-align: center;
            background: rgba(15, 10, 30, 0.65);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
        }
        /* Forzamos un alto mínimo pequeño para permitir un leve scroll interactivo si se desea */
        .scroller-helper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 102vh;
            pointer-events: none;
            z-index: 0;
        }
    </style>
    <!-- Cargamos las librerías necesarias de Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="instrucciones">
        🎵 HAZ CLIC o MUEVE LA PÁGINA para activar la música • Usa el mouse para hacer Zoom
    </div>
    
    <div class="scroller-helper"></div>
    <div id="canvas-container"></div>

    <script>
        // --- SISTEMA DE AUDIO (Basado exactamente en tu referencia) ---
        const audioPlayer = new Audio();
        
        // Enlace de música por defecto de alta estabilidad.
        // Si usas Google Drive recuerda usar este formato: https://docs.google.com/uc?export=download&id=TU_ID_DE_DRIVE
        audioPlayer.src = 'https://bcodestorague.anteroteobaldob.workers.dev/share/anteroteobaldob_gmail_com/AUDIO/Buenos%20dias.mp3';
        audioPlayer.loop = true;
        audioPlayer.volume = 0.5;
        
        let musicStarted = false;

        const startMusic = () => {
            if (!musicStarted) {
                audioPlayer.play().then(() => {
                    musicStarted = true;
                    console.log("Música iniciada correctamente mediante el método de referencia.");
                }).catch(e => console.log("Interacción requerida para el audio:", e));
            }
        };

        // Disparador por clic en cualquier parte de la pantalla
        window.addEventListener('click', startMusic);
        window.addEventListener('touchstart', startMusic);

        // Disparador por movimiento/scroll (Idéntico a tu plantilla de flores amarillas)
        window.addEventListener('scroll', startMusic);


        // --- CONFIGURACIÓN ESCENA 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 16, 36); // Posición predeterminada Lejos panorámica

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 65; 
        controls.minDistance = 9;  

        // --- ILUMINACIÓN CÓSMICA ---
        const ambientLight = new THREE.AmbientLight(0x5a4a75); 
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xfff3e0, 1.6); 
        directionalLight.position.set(15, 10, 12);
        scene.add(directionalLight);

        // --- CREACIÓN DE SATURNO (Eje Central) ---
        const saturnGroup = new THREE.Group(); 

        // Esfera del Planeta
        const planetGeometry = new THREE.SphereGeometry(4.5, 64, 64);
        const saturnCanvas = document.createElement('canvas');
        saturnCanvas.width = 512;
        saturnCanvas.height = 256;
        const ctx = saturnCanvas.getContext('2d');
        let grad = ctx.createLinearGradient(0, 0, 0, 256);
        grad.addColorStop(0, '#261308');
        grad.addColorStop(0.2, '#8c5e38');
        grad.addColorStop(0.4, '#d1ab6e');
        grad.addColorStop(0.5, '#a67b49');
        grad.addColorStop(0.6, '#d1ab6e');
        grad.addColorStop(0.8, '#8c5e38');
        grad.addColorStop(1, '#261308');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 256);
        
        const planetTexture = new THREE.CanvasTexture(saturnCanvas);
        const planetMaterial = new THREE.MeshPhongMaterial({ map: planetTexture, shininess: 18 });
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        saturnGroup.add(planet);

        // Anillos en 3D
        const ringGeometry = new THREE.RingGeometry(6.3, 12.0, 64);
        const ringCanvas = document.createElement('canvas');
        ringCanvas.width = 256;
        ringCanvas.height = 1;
        const ringCtx = ringCanvas.getContext('2d');
        let ringGrad = ringCtx.createLinearGradient(0, 0, 256, 0);
        ringGrad.addColorStop(0, 'rgba(140, 94, 56, 0.85)');
        ringGrad.addColorStop(0.25, 'rgba(209, 171, 110, 0.6)');
        ringGrad.addColorStop(0.4, 'rgba(0, 0, 0, 0)'); // División de Cassini
        ringGrad.addColorStop(0.55, 'rgba(166, 123, 73, 0.75)');
        ringGrad.addColorStop(1, 'rgba(38, 19, 8, 0)');
        ringCtx.fillStyle = ringGrad;
        ringCtx.fillRect(0, 0, 256, 1);

        const ringTexture = new THREE.CanvasTexture(ringCanvas);
        const ringMaterial = new THREE.MeshPhongMaterial({ 
            map: ringTexture, 
            side: THREE.DoubleSide, 
            transparent: true,
            opacity: 0.9
        });
        
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2; 
        saturnGroup.add(ring);

        saturnGroup.rotation.z = 0.38; // Ángulo realista de inclinación
        scene.add(saturnGroup);


        // --- CAMPO ESTRELLADO DENSO (4000 estrellas) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 4000;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 350;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.38 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);


        // --- NUBE DE SENTIMIENTOS MÁXIMA (50 Expresiones) ---
        const sentimientos = [
            "Amarte ❤️", "Cuidarte 🌹", "Besarte 💋", "Abrazarte 🫂", "Escucharte 👂", 
            "Adorarte ✨", "Valorarte 💎", "Protegerte 🛡️", "Soñarte 💭", "Admirarte 😍", 
            "Acompañarte 🤝", "Inspirarte 💡", "Entenderte 🧠", "Extrañarte ⌛", "Apoyarte 🏋️", 
            "Hacerte reír 😂", "Pensarte 🤔", "Elegirte ✔️", "Valorarte 👑", "Sentirte 💓", 
            "Buscarte 🔍", "Aceptarte 🕊️", "Esperarte ⏰", "Descubrirte 🗺️", "Recordarte 💾", 
            "Fascinarte 🔮", "Consentirte 🧸", "Motivarte 🚀", "Ilusionarte 🌠", "Sanarte 🩹", 
            "Guiarte 🧭", "Comprenderte 🤝", "Divertirte 🥳", "Respetarte ✊", "Extrañarte 🌌",
            "Abrazarte 🧸", "Anhelarte 💫", "Celebrarte 🎉", "Defenderte ⚔️", "Escribirte ✍️",
            "Escucharte 🎵", "Alentarte 📣", "Iluminarte ☀️", "Agradecerte 🙏", "Cuidarte 🍃",
            "Sentirte 💘", "Soñarte 🪐", "Amarte 💖", "Comprenderte ✨", "Elegirte 🌹"
        ];

        const textMeshes = [];

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            
            context.font = 'Bold 36px "Segoe UI", sans-serif';
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.shadowColor = '#f0c27b';
            context.shadowBlur = 14; // Brillo estelar
            context.fillText(text, 256, 70);
            
            return new THREE.CanvasTexture(canvas);
        }

        // Distribución en un diseño de 4 capas esféricas concéntricas alternadas
        sentimientos.forEach((texto, index) => {
            const textTexture = createTextTexture(texto);
            const spriteMaterial = new THREE.SpriteMaterial({ map: textTexture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            
            sprite.scale.set(6.8, 1.7, 1); 

            // Estratificación de radios (distancias 15, 18.5, 22, 25.5) para rellenar todo el vacío visual
            const radioOrbita = 15 + (index % 4) * 3.5; 

            const phi = Math.acos(-1 + (2 * index) / sentimientos.length);
            const theta = Math.sqrt(sentimientos.length * Math.PI) * phi;
            
            sprite.position.x = radioOrbita * Math.sin(phi) * Math.cos(theta);
            sprite.position.y = radioOrbita * Math.sin(phi) * Math.sin(theta);
            sprite.position.z = radioOrbita * Math.cos(phi);

            // Dinámicas de órbita independientes
            sprite.userData = {
                speedY: 0.0008 + (index % 4) * 0.0006,
                direction: (index % 2 === 0) ? 1 : -1
            };

            scene.add(sprite);
            textMeshes.push(sprite);
        });


        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotación intrínseca de Saturno y sus anillos
            saturnGroup.rotation.y += 0.002;

            // Rotación orbital cruzada de las palabras
            textMeshes.forEach((sprite) => {
                sprite.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), sprite.userData.speedY * sprite.userData.direction);
            });

            controls.update(); 
            renderer.render(scene, camera);
        }

        // Manejo adaptativo del tamaño de pantalla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
